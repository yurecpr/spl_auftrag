<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeedLabor – Auftragseingang (Mitarbeiter)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
.topbar {
  background: #b90a0a; color: #fff; padding: 12px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.topbar h1 { font-size: 20px; }
#indicator {
  font-size: 13px; padding: 4px 12px; border-radius: 12px;
  background: #333; color: #aaa;
}
.container { max-width: 900px; margin: 0 auto; padding: 20px; }
.card {
  background: #fff; color: #111; border-radius: 8px;
  padding: 24px; margin-bottom: 16px; box-shadow: 0 4px 16px rgba(0,0,0,.4);
}
.card h2 { font-size: 14px; color: #b90a0a; margin-bottom: 12px; text-transform: uppercase; letter-spacing: .5px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field label { font-size: 10px; color: #888; display: block; }
.field .val { font-size: 15px; color: #111; min-height: 22px; border-bottom: 1px solid #ddd; padding-bottom: 3px; }
.fehler .val { font-size: 14px; white-space: pre-wrap; line-height: 1.5; min-height: 48px; border: 1px solid #ddd; padding: 8px; border-radius: 4px; }
.sig-row { display: flex; gap: 24px; align-items: flex-start; }
.sig-row .date { flex: 0 0 140px; }
.sig-box { flex: 1; border: 1px solid #ddd; border-radius: 4px; min-height: 80px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.sig-box img { max-width: 100%; max-height: 80px; }
.sig-box .empty { color: #ccc; font-size: 13px; }
.actions { text-align: center; margin-top: 8px; }
#btn-print {
  background: #b90a0a; color: #fff; border: none; border-radius: 6px;
  padding: 16px 40px; font-size: 18px; cursor: pointer; font-weight: bold;
  box-shadow: 0 4px 12px rgba(185,10,10,.4); transition: .2s;
}
#btn-print:hover { background: #8b0707; }
#btn-print:disabled { background: #888; cursor: not-allowed; box-shadow: none; }
#status-msg { margin-top: 12px; padding: 10px 16px; border-radius: 6px; display: none; text-align: center; font-size: 15px; }
#status-msg.ok { background: #d4edda; color: #155724; display: block; }
#status-msg.err { background: #f8d7da; color: #721c24; display: block; }
.empty-state { text-align: center; padding: 60px 20px; color: #888; }
.empty-state .icon { font-size: 60px; margin-bottom: 16px; }
</style>
</head>
<body>

<div class="topbar">
  <h1> SpeedLabor – Auftragseingang</h1>
  <span id="indicator">⚪ Verbinde…</span>
</div>

<div class="container">
  <div id="empty-state" class="card empty-state">
    <div class="icon">📋</div>
    <p>Warte auf Kundeneingaben…<br><small>Das Formular auf dem Tablet wird hier automatisch angezeigt.</small></p>
  </div>

  <div id="form-preview" style="display:none">
    <div class="card" style="background:#fff3f3;border-left:4px solid #b90a0a;padding:12px 20px">
      <span style="font-size:13px;color:#888">Auftragsnummer</span>
      <div id="v_ordernumber" style="font-size:22px;font-weight:bold;color:#b90a0a">–</div>
    </div>

    <div class="card">
      <h2>1. Rechnungsdaten</h2>
      <div class="grid">
        <div class="field"><label>Firma / Name</label><div class="val" id="v_name"></div></div>
        <div class="field"><label>Straße</label><div class="val" id="v_strasse"></div></div>
        <div class="field"><label>PLZ, Ort</label><div class="val" id="v_plz"></div></div>
        <div class="field"><label>E-Mail</label><div class="val" id="v_email"></div></div>
        <div class="field"><label>Telefon</label><div class="val" id="v_telefon"></div></div>
      </div>
    </div>

    <div class="card">
      <h2>2. Fahrzeugdaten</h2>
      <div class="grid">
        <div class="field"><label>Marke / Hersteller</label><div class="val" id="v_marke"></div></div>
        <div class="field"><label>Baujahr</label><div class="val" id="v_baujahr"></div></div>
        <div class="field"><label>Modell / Typ</label><div class="val" id="v_modell"></div></div>
        <div class="field"><label>Motor (ccm)</label><div class="val" id="v_motor"></div></div>
        <div class="field"><label>Kilometerstand</label><div class="val" id="v_km"></div></div>
        <div class="field"><label>Kraftstoff</label><div class="val" id="v_kraftstoff"></div></div>
      </div>
    </div>

    <div class="card fehler">
      <h2>3. Fehlerbeschreibung</h2>
      <div class="field"><div class="val" id="v_fehler"></div></div>
    </div>

    <div class="card">
      <h2>Unterschrift</h2>
      <div class="sig-row">
        <div class="date field"><label>Datum</label><div class="val" id="v_datum"></div></div>
        <div class="sig-box" id="v_sig_box">
          <span class="empty">Noch keine Unterschrift</span>
        </div>
      </div>
    </div>

    <div class="actions">
      <button id="btn-print" onclick="printAndSave()">✓ Drucken &amp; Speichern</button>
      <div id="status-msg"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyM5wheWtiEuIargFBVJDavpxBy4b021-wvqjYP0hxc1csd9IidxTBdDRh20pd3EgZS/exec';
// ============================================================

let currentData = null;

function setIndicator(ok, text) {
  const el = document.getElementById('indicator');
  el.textContent = text;
  el.style.background = ok ? '#155724' : '#333';
  el.style.color = ok ? '#d4edda' : '#aaa';
}

function fillPreview(d) {
  ['name','strasse','plz','email','telefon','marke','baujahr','modell','motor','km','kraftstoff','fehler','datum'].forEach(k => {
    const el = document.getElementById('v_' + k);
    if (el) el.textContent = d[k] || '';
  });
  const sigBox = document.getElementById('v_sig_box');
  if (d.signature) {
    sigBox.innerHTML = '<img src="' + d.signature + '" alt="Unterschrift">';
  } else {
    sigBox.innerHTML = '<span class="empty">Noch keine Unterschrift</span>';
  }
}

async function poll() {
  try {
    const res  = await fetch(GAS_URL + '?action=getDraft', { redirect: 'follow' });
    const data = await res.json();

    const hasData = data.status === 'pending' && data.formData;

    if (hasData) {
      currentData = data.formData;
      currentData._orderNumber = data.orderNumber || '';
      fillPreview(currentData);
      document.getElementById('v_ordernumber').textContent = data.orderNumber ? ('#' + data.orderNumber) : '–';
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('form-preview').style.display = 'block';
      setIndicator(true, '🟢 Auftrag #' + (data.orderNumber || '?') + ' – Kunde füllt aus');
    } else {
      currentData = null;
      document.getElementById('empty-state').style.display = 'block';
      document.getElementById('form-preview').style.display = 'none';
      setIndicator(true, '🟢 Verbunden – kein Auftrag');
    }
  } catch(e) {
    setIndicator(false, '🔴 Keine Verbindung');
  }
}

// ============================================================
// PDF GENERATION
// ============================================================
function buildPDFFromData(d) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('p', 'mm', 'a4');
  const PW = 210, PH = 297;
  const ML = 14, MR = 14;
  const CW = (PW - ML - MR - 6) / 2;
  let y = 13;
  const lx = ML, rx = ML + CW + 6;

  function hline(yy, x1, x2, lw) {
    doc.setLineWidth(lw || 0.3); doc.setDrawColor(160);
    doc.line(x1 || ML, yy, x2 || PW - MR, yy); doc.setDrawColor(0);
  }
  function cell(label, value, x, cy, w) {
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(110);
    doc.text(label, x, cy);
    doc.setFontSize(10.5); doc.setTextColor(0);
    if (value) doc.text(value, x, cy + 5.5);
    hline(cy + 7.5, x, x + w);
    return cy + 12;
  }

  // Logo
  let logoOk = false;
  const imgEl = document.getElementById('logo-img');
  if (imgEl && imgEl.complete && imgEl.naturalWidth > 0) {
    try {
      const tc = document.createElement('canvas');
      tc.width = imgEl.naturalWidth; tc.height = imgEl.naturalHeight;
      tc.getContext('2d').drawImage(imgEl, 0, 0);
      const logoData = tc.toDataURL('image/png');
      const logoW = 78, logoH = logoW * (imgEl.naturalHeight / imgEl.naturalWidth);
      doc.addImage(logoData, 'PNG', ML + 8, y, logoW, logoH);
      logoOk = true;
    } catch(e) {}
  }
  if (!logoOk) {
    doc.setFillColor(185,10,10); doc.rect(ML, y+1, 88, 19, 'F');
    doc.setFillColor(220,220,220); doc.rect(ML, y+1, 4, 19, 'F'); doc.rect(ML+84, y+1, 4, 19, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(18); doc.setTextColor(255,255,255);
    doc.text('SPEED-LABOR', ML+8, y+13.5);
    doc.setFontSize(5.5); doc.setFont('helvetica','normal'); doc.setTextColor(255,230,0);
    doc.text('www.speedlabor.de', ML+56, y+4);
    doc.setTextColor(200,200,200);
    doc.text('Qualitäts-Chiptuning  .  Software Anpassung  .  Individual Abstimmung  .  Motor-Tuning', ML+4, y+17.5);
  }
  doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(30);
  doc.text('Speedlabor 24 UG', PW-MR, y+1, {align:'right'});
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(60);
  ['(haftungsbeschränkt)','Eisenfelden 14','84543 Winhöring'].forEach((l,i) => doc.text(l, PW-MR, y+5.5+i*4, {align:'right'}));
  y += 26;

  doc.setTextColor(0); doc.setFont('helvetica','bold'); doc.setFontSize(14);
  doc.text(d._orderNumber ? ('Auftrag Nr. ' + d._orderNumber) : 'Auftrag', PW/2, y, {align:'center'}); y += 7;
  doc.setFontSize(16);
  doc.text('Steuergerät Überprüfung oder Reparatur', PW/2, y, {align:'center'}); y += 7;

  doc.setFontSize(10.5); doc.setFont('helvetica','bold');
  doc.text('1. Rechnungsdaten', lx, y); doc.text('2. Fahrzeugdaten', rx, y); y += 2;
  doc.setLineWidth(0.6); doc.line(ML, y, PW-MR, y); y += 5;

  let ly = y, ry = y;
  ly = cell('Firma, Vorname, Name',                     d.name||'',      lx, ly, CW);
  ry = cell('Marke / Hersteller',                    d.marke||'',     rx, ry, CW);
  ry = cell('Baujahr',                                 d.baujahr||'',   rx, ry, CW);
  ly = cell('Straße',                                    d.strasse||'',   lx, ly, CW);
  ry = cell('Modell / Typ',                              d.modell||'',    rx, ry, CW);
  ly = cell('PLZ, Ort',                                  d.plz||'',       lx, ly, CW);
  ry = cell('Motor (ccm) / Hubraum',                     d.motor||'',     rx, ry, CW);
  ly = cell('E-Mail',                                    d.email||'',     lx, ly, CW);
  ry = cell('Kilometerstand',                            d.km||'',        rx, ry, CW);
  ly = cell('Mobil, Telefon (Erreichbarkeit – Zeiten)',  d.telefon||'',   lx, ly, CW);
  ry = cell('Kraftstoff',                                d.kraftstoff||'',rx, ry, CW);
  y = Math.max(ly, ry) + 3;

  doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(0);
  doc.text('3. Fehlerbeschreibung', ML, y); y += 2;
  doc.setLineWidth(0.6); doc.line(ML, y, PW-MR, y); y += 5;
  doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
  doc.text('Fehlerursache / was macht das Fahrzeug falsch?', ML, y); y += 4;
  const fl = doc.splitTextToSize(d.fehler||'', PW-ML-MR-4);
  const fh = Math.max(22, fl.length*4.5+6);
  doc.setDrawColor(150); doc.setLineWidth(0.3); doc.rect(ML, y, PW-ML-MR, fh);
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.text(fl, ML+2, y+5);
  doc.setDrawColor(0); y += fh + 5;

  doc.setFont('helvetica','bold'); doc.setFontSize(8);
  doc.text('Erklärung zur Auftragserteilung:', ML, y);
  doc.setFont('helvetica','normal'); y += 3.5;
  const legal = [
    'Bitte sorgfältig durchlesen.',
    'Sollten wir bei der Diagnose an ihrem Teil keine messbaren bzw. erkennbaren Fehler feststellen, werden wir je nach Aufwand jeweils 80,00 € inkl. MwSt. pro Teil abrechnen.',
    'Die Kosten werden bei der Auftragserteilung mit einer Reparatur verrechnet. Erst nach Ihrer Zustimmung zur Reparatur wird eine Reparatur durchgeführt.',
    '(Wir geben 12 Monate Gewährleistung auf unsere Reparatur)',
    'Sollte nach unserer Reparatur das Steuergerät nicht ordnungsgemäß funktionieren, behalten wir uns das Recht zur Diagnose und Nachbesserung vor. Sollte unsere Reparatur erfolglos sein, werden die Reparaturkosten gutgeschrieben oder mit einem Austausch-Steuergerät verrechnet. Alle weiteren Kosten, unter anderem Verbrauchsmaterialien, Leihauto oder Einbaukosten etc. werden grundsätzlich nicht zurückerstattet. Wir haften für jegliche Folgeschäden am Fahrzeug nicht. Wir behalten uns das Recht eine Reklamation abzulehnen, wenn die Teile nach unserer Reparatur nicht von einer Werkstatt nachweislich eingebaut wurden.',
    'Ihre Daten zum Auftrag werden gemäß den gesetzlichen Datenschutzanforderungen, einschließlich Ihrer Postanschrift und Ihrer E-Mail-Adresse, ausschließlich zur Abwicklung Ihres Auftrages verwendet.',
    'Wenn Sie Ihre Teile an uns versenden, akzeptieren Sie diese Bedingungen automatisch.',
    'Mit diesem Auftrag akzeptieren Sie unsere AGB (Allgemeine Geschäftsbedingungen). Sie finden diese auf unserer Internet Seite.',
    '',
    'Ich versichere, dass die vorstehenden Angaben der Wahrheit entsprechen. Ich beauftrage die Fa. Speedlabor 24 UG (haftungsbeschränkt) mit der Fehlerdiagnose für das/die beiliegende/n Steuergerät/e.'
  ];
  doc.setFontSize(7); doc.setTextColor(40);
  legal.forEach(line => {
    const w = doc.splitTextToSize(line, PW-ML-MR);
    doc.text(w, ML, y);
    y += w.length * 3.2 + (line===''?0:0.5);
  });
  doc.setTextColor(0); y += 5;

  if (y > 252) { doc.addPage(); y = 18; }
  const sigY = y+12, datW = 42, sigX = ML+datW+14, sigW = PW-MR-sigX;
  doc.setLineWidth(0.5); doc.setDrawColor(0);
  doc.line(ML, sigY, ML+datW, sigY);
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(60);
  doc.text('Datum', ML+datW/2, sigY+3.5, {align:'center'});
  doc.setFontSize(10.5); doc.setTextColor(0);
  doc.text(d.datum||'', ML+2, sigY-2);
  doc.line(sigX, sigY, PW-MR, sigY);
  doc.setFontSize(8); doc.setTextColor(60);
  doc.text('Unterschrift / Firmenstempel', sigX+sigW/2, sigY+3.5, {align:'center'});
  if (d.signature) {
    const imgH = Math.min(24, sigY-y-2);
    doc.addImage(d.signature, 'PNG', sigX, sigY-imgH-1, sigW, imgH);
  }
  return doc;
}

// ============================================================
async function printAndSave() {
  if (!currentData) return;
  const btn = document.getElementById('btn-print');
  const msg = document.getElementById('status-msg');
  btn.disabled = true;
  btn.textContent = '⏳ Wird verarbeitet…';
  msg.style.display = 'none';

  try {
    const d = currentData;
    const name = (d.name||'Kunde').replace(/[^\wäöüÄÖÜß\s]/g,'').replace(/\s+/g,'_');
    const date = (d.datum||'').replace(/\./g,'-');
    const nr = d._orderNumber ? (d._orderNumber + '_') : '';
    const filename = 'Auftrag_' + nr + name + '_' + date + '.pdf';

    const doc = buildPDFFromData(d);

    // 1) Print (open PDF in new tab with auto-print)
    doc.autoPrint();
    const blob = doc.output('blob');
    const blobUrl = URL.createObjectURL(blob);
    const pw = window.open(blobUrl, '_blank');
    if (pw) pw.onload = () => URL.revokeObjectURL(blobUrl);
    else setTimeout(() => URL.revokeObjectURL(blobUrl), 15000);

    // 2) Save to Google Drive
    const b64 = doc.output('datauristring').split(',')[1];
    let driveOk = false;
    try {
      const res = await fetch(GAS_URL, {
        method: 'POST', redirect: 'follow',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'savePDF', filename, pdfBase64: b64 })
      });
      const result = await res.json();
      driveOk = result.success === true;
    } catch(e) { console.warn('Drive save failed:', e); }

    // 3) Confirm print → tablet will reset
    await fetch(GAS_URL, {
      method: 'POST', redirect: 'follow',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'confirmPrint' })
    });

    msg.textContent = driveOk
      ? '✓ Gedruckt & in Google Drive gespeichert: ' + filename
      : '✓ Gedruckt. Google Drive-Speicherung fehlgeschlagen – Datei lokal verfügbar.';
    msg.className = 'ok';
    btn.textContent = '✓ Erledigt';

    // After 5 sec reset to waiting state
    setTimeout(() => {
      currentData = null;
      document.getElementById('form-preview').style.display = 'none';
      document.getElementById('empty-state').style.display = 'block';
      msg.style.display = 'none';
      btn.disabled = false;
      btn.textContent = '✓ Drucken & Speichern';
    }, 5000);

  } catch(err) {
    msg.textContent = '⚠ Fehler: ' + err.message;
    msg.className = 'err';
    btn.disabled = false;
    btn.textContent = '✓ Drucken & Speichern';
  }
}

poll();
setInterval(poll, 3000);
